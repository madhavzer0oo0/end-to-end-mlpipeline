stages:
  data_ingestion:
    cmd: cd src && python data_ingestion.py
    deps:
    - src/data_ingestion.py
    params:
    - data_ingestion.test_size
    outs:
    - src/data/raw
  data_preprocessing:
    cmd: cd src && python data_preprocessing.py
    deps:
    - src/data/raw
    - src/data_preprocessing.py
    outs:
    - src/data/interim
  feature_engineering:
    cmd: cd src && python feature_engineering.py
    deps:
    - src/data/interim
    - src/feature_engineering.py
    params:
    - feature_engineering.max_features
    outs:
    - src/data/processed
  model_building:
    cmd: cd src && python model_training.py
    deps:
    - src/data/processed
    - src/model_training.py
    params:
    - model_building.n_estimators
    - model_building.random_state
    outs:
    - src/models/model.pkl
  model_evaluation:
    cmd: cd src && python model_evaluation.py
    deps:
    - src/models/model.pkl
    - src/model_evaluation.py
    metrics:
    - src/reports/metrics.json
params:
- src/dvclive/params.yaml
metrics:
- src/dvclive/metrics.json
plots:
- src/dvclive/plots/metrics:
    x: step